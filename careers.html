<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusLegal — Careers</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --nexuslegal-bg: #0a0a0a;
    }
    body { background: var(--nexuslegal-bg); }
  </style>
</head>
<body class="min-h-screen flex flex-col text-slate-100 antialiased">
  <!-- Emerald/Teal ambient background glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
    <div class="absolute bg-emerald-500/40 -top-40 -right-40 w-96 h-96 rounded-full blur-3xl opacity-30"></div>
    <div class="absolute bg-teal-500/30 top-1/2 -left-32 w-80 h-80 rounded-full blur-3xl opacity-30"></div>
  </div>
  <main class="flex flex-1 justify-center items-center pt-20 pb-10 px-4">
    <div class="w-full max-w-2xl flex flex-col items-center">
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-center mb-6 bg-gradient-to-r from-emerald-400 via-emerald-500 to-emerald-300 bg-clip-text text-transparent drop-shadow-emerald-500/60">
        Join the NexusLegal Team
      </h1>
      <p class="text-slate-300 text-base sm:text-lg text-center max-w-2xl mb-10">
        We are always looking for top talent in AI and Legal Tech.
      </p>
      <div class="w-full mb-12">
        <h2 class="text-xl font-semibold text-emerald-200 mb-3">Open Positions</h2>
        <ul class="space-y-4">
          <li class="bg-white/5 rounded-lg px-5 py-4 border border-white/10">
            <span class="font-medium text-emerald-300">Senior Machine Learning Engineer</span>
          </li>
          <li class="bg-white/5 rounded-lg px-5 py-4 border border-white/10">
            <span class="font-medium text-emerald-300">Legal Consultant</span>
          </li>
          <li class="bg-white/5 rounded-lg px-5 py-4 border border-white/10">
            <span class="font-medium text-emerald-300">Product Designer</span>
          </li>
        </ul>
      </div>
      <a href="index.html" class="text-emerald-300/80 text-sm hover:underline hover:text-emerald-200 transition flex items-center gap-1">
        <svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to Home
      </a>
    </div>
  </main>
</body>
</html>
