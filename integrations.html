<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusLegal — Integrations</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --nexuslegal-bg: #0a0a0a;
    }
    body { background: var(--nexuslegal-bg); }
    .glass-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 10px 32px 0 rgba(16,185,129,0.14);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-slate-100 antialiased">
  <!-- Emerald/Teal ambient background glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
    <div class="absolute bg-emerald-500/40 -top-40 -right-40 w-96 h-96 rounded-full blur-3xl opacity-30"></div>
    <div class="absolute bg-teal-500/30 top-1/2 -left-32 w-80 h-80 rounded-full blur-3xl opacity-30"></div>
  </div>

  <div class="relative min-h-screen flex flex-col justify-center items-center pt-16 pb-12">
    <main class="w-full max-w-5xl flex flex-col items-center flex-1 px-4">
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-center mb-10 bg-gradient-to-r from-emerald-400 via-emerald-500 to-emerald-300 bg-clip-text text-transparent drop-shadow-emerald-500/70">
        Connect NexusLegal with Your Tools
      </h1>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 w-full">
        <div class="glass-card rounded-xl p-8 flex flex-col items-center justify-center text-center transition hover:shadow-emerald-400/30 cursor-pointer">
          <span class="text-2xl font-semibold text-emerald-400 mb-3">Clio</span>
          <span class="text-slate-300 text-sm">Practice Management</span>
        </div>
        <div class="glass-card rounded-xl p-8 flex flex-col items-center justify-center text-center transition hover:shadow-emerald-400/30 cursor-pointer">
          <span class="text-2xl font-semibold text-emerald-400 mb-3">DocuSign</span>
          <span class="text-slate-300 text-sm">E-Signatures</span>
        </div>
        <div class="glass-card rounded-xl p-8 flex flex-col items-center justify-center text-center transition hover:shadow-emerald-400/30 cursor-pointer">
          <span class="text-2xl font-semibold text-emerald-400 mb-3">Google Drive</span>
          <span class="text-slate-300 text-sm">Cloud Documents</span>
        </div>
        <div class="glass-card rounded-xl p-8 flex flex-col items-center justify-center text-center transition hover:shadow-emerald-400/30 cursor-pointer">
          <span class="text-2xl font-semibold text-emerald-400 mb-3">Office 365</span>
          <span class="text-slate-300 text-sm">Collaboration Suite</span>
        </div>
        <div class="glass-card rounded-xl p-8 flex flex-col items-center justify-center text-center opacity-70">
          <span class="text-2xl font-semibold text-emerald-200 mb-3">+ More</span>
          <span class="text-slate-400 text-sm">Coming soon</span>
        </div>
      </div>

      <div class="w-full flex justify-center mt-12">
        <a href="index.html" class="text-emerald-300/80 text-sm hover:underline hover:text-emerald-200 transition flex items-center gap-1">
          <svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          Back to Home
        </a>
      </div>
    </main>
  </div>
</body>
</html>
