<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusLegal — Contact Us</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --nexus-bg: #0a0a0a;
      --nexus-emerald: #10b981;
      --nexus-emerald-bright: #34d399;
      --nexus-emerald-glow: #059669;
    }
    body { background: var(--nexus-bg); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[var(--nexus-bg)] antialiased text-slate-100">
  <!-- Emerald background glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0" aria-hidden="true">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-emerald-600/40 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 -left-32 w-80 h-80 bg-emerald-500/30 rounded-full blur-2xl"></div>
  </div>
  <main class="relative z-10 flex flex-1 items-center justify-center w-full py-12">
    <div class="w-full max-w-lg mx-auto bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl shadow-xl px-8 py-10 flex flex-col gap-8 glass-card">
      <div class="flex flex-col items-center gap-2">
        <span class="text-3xl font-extrabold bg-gradient-to-r from-emerald-400 via-emerald-500 to-emerald-300 bg-clip-text text-transparent drop-shadow-lg select-none">
          NexusLegal
        </span>
        <span class="text-slate-400 text-sm tracking-wide font-light">
          Contact Us
        </span>
      </div>
      <form class="flex flex-col gap-5">
        <div class="flex flex-col gap-1">
          <label for="name" class="text-slate-300 text-sm font-medium mb-1">Name</label>
          <input
            id="name"
            name="name"
            type="text"
            autocomplete="name"
            required
            placeholder="Your Name"
            class="rounded-lg bg-black/40 border border-white/10 px-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/70 focus:border-emerald-400 transition"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="email" class="text-slate-300 text-sm font-medium mb-1">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
            placeholder="you@email.com"
            class="rounded-lg bg-black/40 border border-white/10 px-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/70 focus:border-emerald-400 transition"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="subject" class="text-slate-300 text-sm font-medium mb-1">Subject</label>
          <input
            id="subject"
            name="subject"
            type="text"
            required
            placeholder="Subject"
            class="rounded-lg bg-black/40 border border-white/10 px-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/70 focus:border-emerald-400 transition"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="message" class="text-slate-300 text-sm font-medium mb-1">Message</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            required
            placeholder="Type your message..."
            class="rounded-lg bg-black/40 border border-white/10 px-4 py-2.5 text-slate-100 placeholder-slate-500 resize-y min-h-[120px] max-h-60 focus:outline-none focus:ring-2 focus:ring-emerald-500/70 focus:border-emerald-400 transition"
          ></textarea>
        </div>
        <button
          type="submit"
          class="mt-3 w-full py-3 rounded-lg bg-gradient-to-r from-emerald-400 via-emerald-500 to-emerald-600 font-semibold text-lg shadow-md transition hover:from-emerald-500 hover:to-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/70 active:scale-[.98]"
        >
          Send Message
        </button>
      </form>
      <div class="flex justify-center">
        <a href="index.html" class="text-emerald-300/80 text-sm hover:underline hover:text-emerald-200 transition flex items-center gap-1">
          <svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          Back to Home
        </a>
      </div>
    </div>
  </main>
</body>
</html>
